  <!-- Decorative dots -->
  <circle cx="40" cy="50" r="4" fill="#FF6FA8"/>
  <circle cx="160" cy="55" r="3" fill="#7FC97F"/>
  <circle cx="45" cy="155" r="3" fill="#9B6BFF"/>
  <circle cx="160" cy="150" r="4" fill="#FF6B6B"/>
  
  <!-- Q letter -->
